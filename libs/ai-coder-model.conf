#!/bin/bash
# ==============================================================================
# AI-CODER-MODEL.CONF | Model Family Configuration
# ==============================================================================
# Edit this file to switch model families or individual tier variants.
# Every setting can be overridden by exporting the variable before invoking
# ai-coder â€” the ${VAR:-default} pattern means the env var wins when set.

# Guard against double-sourcing
[ "${_AI_CODER_MODEL_CONF_LOADED:-}" = "1" ] && return 0
readonly _AI_CODER_MODEL_CONF_LOADED=1

# --- [ MODEL FAMILY ] ---------------------------------------------------------

# Display name shown in status messages and log output.
MODEL_FAMILY="${MODEL_FAMILY:-Gemma 4}"

# Filename substring matched when scanning ~/ai-models for a compatible GGUF.
# Used as a case-insensitive grep pattern, e.g. "gemma", "llama", "mistral".
MODEL_FILE_PATTERN="${MODEL_FILE_PATTERN:-gemma}"

# When true, abort if no file matching MODEL_FILE_PATTERN is found locally.
# Set to false to allow any GGUF found in MODEL_STORAGE_DIR as a fallback.
MODEL_STRICT_FAMILY="${MODEL_STRICT_FAMILY:-true}"

# --- [ INFERENCE SETTINGS ] ---------------------------------------------------

# Context window size per parallel slot (tokens). Passed as -c to llama.cpp.
MODEL_CTX_SIZE="${MODEL_CTX_SIZE:-65536}"

# Number of parallel inference slots. Passed as --parallel to llama.cpp.
MODEL_MAX_SLOTS="${MODEL_MAX_SLOTS:-1}"

# --- [ VRAM TIER CUTOFFS (GB) ] -----------------------------------------------
# Minimum total VRAM required to qualify for each tier. Tiers are evaluated
# from largest to smallest; the first matching tier wins.

MODEL_TIER_8GB_MIN="${MODEL_TIER_8GB_MIN:-8}"
MODEL_TIER_12GB_MIN="${MODEL_TIER_12GB_MIN:-11}"
MODEL_TIER_16GB_MIN="${MODEL_TIER_16GB_MIN:-15}"
MODEL_TIER_24GB_MIN="${MODEL_TIER_24GB_MIN:-23}"
MODEL_TIER_32GB_MIN="${MODEL_TIER_32GB_MIN:-31}"

# --- [ TIER MODEL DEFINITIONS ] -----------------------------------------------
# Each tier has three variables:
#   MODEL_<tier>_FILE  â€” filename stored under MODEL_STORAGE_DIR
#   MODEL_<tier>_URL   â€” direct GGUF download URL
#   MODEL_<tier>_DESC  â€” human-readable description shown during download

MODEL_8GB_FILE="${MODEL_8GB_FILE:-gemma-4-E2B-it-Q4_K_M.gguf}"
MODEL_8GB_URL="${MODEL_8GB_URL:-https://huggingface.co/unsloth/gemma-4-E2B-it-GGUF/resolve/main/gemma-4-E2B-it-Q4_K_M.gguf}"
MODEL_8GB_DESC="${MODEL_8GB_DESC:-Gemma-4 E2B Q4_K_M (8GB tier)}"

MODEL_12GB_FILE="${MODEL_12GB_FILE:-gemma-4-E4B-it-Q8_0.gguf}"
MODEL_12GB_URL="${MODEL_12GB_URL:-https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/gemma-4-E4B-it-Q8_0.gguf}"
MODEL_12GB_DESC="${MODEL_12GB_DESC:-Gemma-4 E4B Q8_0 (12GB tier)}"

MODEL_16GB_FILE="${MODEL_16GB_FILE:-gemma-4-26B-A4B-it-UD-IQ4_XS.gguf}"
MODEL_16GB_URL="${MODEL_16GB_URL:-https://huggingface.co/unsloth/gemma-4-26B-A4B-it-GGUF/resolve/main/gemma-4-26B-A4B-it-UD-IQ4_XS.gguf}"
MODEL_16GB_DESC="${MODEL_16GB_DESC:-Gemma-4 26B A4B UD-IQ4_XS (16GB tier)}"

MODEL_24GB_FILE="${MODEL_24GB_FILE:-google_gemma-4-26B-A4B-it-Q5_K_M.gguf}"
MODEL_24GB_URL="${MODEL_24GB_URL:-https://huggingface.co/bartowski/google_gemma-4-26B-A4B-it-GGUF/resolve/main/google_gemma-4-26B-A4B-it-Q5_K_M.gguf}"
MODEL_24GB_DESC="${MODEL_24GB_DESC:-Gemma-4 26B A4B Q5_K_M (24GB tier)}"

MODEL_32GB_FILE="${MODEL_32GB_FILE:-gemma-4-31B-it-Q5_K_M.gguf}"
MODEL_32GB_URL="${MODEL_32GB_URL:-https://huggingface.co/unsloth/gemma-4-31B-it-GGUF/resolve/main/gemma-4-31B-it-Q5_K_M.gguf}"
MODEL_32GB_DESC="${MODEL_32GB_DESC:-Gemma-4 31B Q5_K_M (32GB tier)}"
