#!/bin/bash
# ==============================================================================
# DEVSTRAL2.CONF | Devstral 2 Model Family Configuration
# ==============================================================================
# Defines the model family identity and per-VRAM-tier model files for Devstral 2.
# Sourced by ai-coder after family selection, following config/ai-coder-model.conf.
#
# Devstral 2 (released December 2025 by Mistral AI) is a coding-specialist
# agentic family built under a collaboration between Mistral AI and All Hands AI.
# It excels at tool use, multi-file editing, and software engineering agents.
#
# Two models were released; only the small variant is practical on consumer GPU:
#
#   Small 2 — Devstral Small 2 (24B params, Mistral-Small-3.1 base):
#             Fits on a single RTX 4090 or a Mac with 32GB RAM. This conf
#             covers all five VRAM tiers using this model at escalating quants.
#             SWE-Bench Verified: 68.0% — #1 open-source at 24B class.
#
#   Devstral 2 — 123B params: smallest GGUF is ~100+ GB. Multi-GPU server
#             hardware required. Not included in this conf.
#
# Key capabilities vs. Devstral Small 1.1 (2507):
#   - Vision: image input re-enabled (removed in 1.1, back in Small 2)
#   - Context: 256k tokens (up from 128k)
#   - Architecture: Ministral-3 style with ScalableSoftmax attention
#   - Tooling: Mistral function-calling format; Mistral Vibe CLI support
#   - Benchmarks: +21.2% SWE-Bench Verified vs 1.1 (68.0% vs 46.8%)
#
# License: Apache 2.0
#
# Every setting can be overridden by exporting the variable before invoking
# ai-coder — the ${VAR:-default} pattern means the env var wins when set.

# Guard against double-sourcing
[ "${_AI_CODER_DEVSTRAL2_CONF_LOADED:-}" = "1" ] && return 0
readonly _AI_CODER_DEVSTRAL2_CONF_LOADED=1

# --- [ MODEL FAMILY ] ---------------------------------------------------------

# Display name shown in the family selection menu, status messages, and logs.
MODEL_FAMILY="${MODEL_FAMILY:-Devstral 2}"

# KV cache quantization — q8_0 is fine; Devstral 2 Small fits within tier VRAM.
MODEL_KV_TYPE="${MODEL_KV_TYPE:-q8_0}"

# Jinja chat template — use the model's built-in Jinja template for prompt formatting.
# Devstral 2 uses Mistral's JSON function-calling format; --jinja is safe and recommended.
MODEL_JINJA="${MODEL_JINJA:-true}"

# --- [ TIER MODEL DEFINITIONS ] -----------------------------------------------
# Each tier has these variables:
#   MODEL_<tier>_FILE  — filename stored under MODEL_STORAGE_DIR
#   MODEL_<tier>_URL   — direct GGUF download URL
#   MODEL_<tier>_DESC  — human-readable description shown during download
#   MODEL_<tier>_SHA256 — expected sha256, verified after download (blank = skip)
#
# Sizes sourced from unsloth hardware compatibility table (December 2025):
#   UD-IQ2_XXS =  6.75 GB
#   Q3_K_M     = 11.5  GB
#   Q4_K_M     = 14.3  GB
#   Q6_K       = 19.3  GB
#   Q8_0       = 25.1  GB

# 8GB tier: UD-IQ2_XXS — 6.75 GB; comfortable fit with KV cache headroom
MODEL_8GB_FILE="${MODEL_8GB_FILE:-Devstral-Small-2-24B-Instruct-2512-UD-IQ2_XXS.gguf}"
MODEL_8GB_URL="${MODEL_8GB_URL:-https://huggingface.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF/resolve/main/Devstral-Small-2-24B-Instruct-2512-UD-IQ2_XXS.gguf}"
MODEL_8GB_SHA256="${MODEL_8GB_SHA256:-40e93f2c700057860a4917552589d27119127070405cde3e7ed1c7f9ba4fc6db}"
MODEL_8GB_DESC="${MODEL_8GB_DESC:-Devstral Small 2 UD-IQ2_XXS (8GB tier; ~6.75GB)}"

# 12GB tier: Q3_K_M — 11.5 GB; improved quality over 2-bit
MODEL_12GB_FILE="${MODEL_12GB_FILE:-Devstral-Small-2-24B-Instruct-2512-Q3_K_M.gguf}"
MODEL_12GB_URL="${MODEL_12GB_URL:-https://huggingface.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF/resolve/main/Devstral-Small-2-24B-Instruct-2512-Q3_K_M.gguf}"
MODEL_12GB_SHA256="${MODEL_12GB_SHA256:-53466aa3e486e6f0068c2593d12aeb15fb079c1dfe443ab922c468c39761bd16}"
MODEL_12GB_DESC="${MODEL_12GB_DESC:-Devstral Small 2 Q3_K_M (12GB tier; ~11.5GB)}"

# 16GB tier: Q4_K_M — 14.3 GB; standard 4-bit sweet spot
MODEL_16GB_FILE="${MODEL_16GB_FILE:-Devstral-Small-2-24B-Instruct-2512-Q4_K_M.gguf}"
MODEL_16GB_URL="${MODEL_16GB_URL:-https://huggingface.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF/resolve/main/Devstral-Small-2-24B-Instruct-2512-Q4_K_M.gguf}"
MODEL_16GB_SHA256="${MODEL_16GB_SHA256:-d14ba9edee1bb4c4996a726deb81e49ae81800a3216f0774634238c380aee496}"
MODEL_16GB_DESC="${MODEL_16GB_DESC:-Devstral Small 2 Q4_K_M (16GB tier; ~14.3GB)}"

# 24GB tier: Q6_K — 19.3 GB; near-lossless 6-bit with plenty of KV headroom
MODEL_24GB_FILE="${MODEL_24GB_FILE:-Devstral-Small-2-24B-Instruct-2512-Q6_K.gguf}"
MODEL_24GB_URL="${MODEL_24GB_URL:-https://huggingface.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF/resolve/main/Devstral-Small-2-24B-Instruct-2512-Q6_K.gguf}"
MODEL_24GB_SHA256="${MODEL_24GB_SHA256:-b04b3e19730d7a1e19530f40b947b69c028b090cb7c58c1515cf1fc2ece5f821}"
MODEL_24GB_DESC="${MODEL_24GB_DESC:-Devstral Small 2 Q6_K (24GB tier; ~19.3GB)}"

# 32GB tier: Q8_0 — 25.1 GB; near-lossless 8-bit, maximum quality
MODEL_32GB_FILE="${MODEL_32GB_FILE:-Devstral-Small-2-24B-Instruct-2512-Q8_0.gguf}"
MODEL_32GB_URL="${MODEL_32GB_URL:-https://huggingface.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF/resolve/main/Devstral-Small-2-24B-Instruct-2512-Q8_0.gguf}"
MODEL_32GB_SHA256="${MODEL_32GB_SHA256:-0760502e9228234f6cfa843f8870b8fc91c46a13664cf766c639229cccc80866}"
MODEL_32GB_DESC="${MODEL_32GB_DESC:-Devstral Small 2 Q8_0 (32GB tier; ~25.1GB)}"
