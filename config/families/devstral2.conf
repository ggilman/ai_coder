#!/bin/bash
# ==============================================================================
# DEVSTRAL2.CONF | Devstral 2 Model Family Configuration
# ==============================================================================
# Defines the model family identity and per-VRAM-tier model files for Devstral 2.
# Sourced by ai-coder after family selection, following config/ai-coder-model.conf.
#
# Devstral 2 (released December 2025 by Mistral AI) is a coding-specialist
# agentic family built under a collaboration between Mistral AI and All Hands AI.
# It excels at tool use, multi-file editing, and software engineering agents.
#
# Two models were released; only the small variant is practical on consumer GPU:
#
#   Small 2 — Devstral Small 2 (24B params, Mistral-Small-3.1 base):
#             Fits on a single RTX 4090 or a Mac with 32GB RAM. This conf
#             covers all five VRAM tiers using this model at escalating quants.
#             SWE-Bench Verified: 68.0% — #1 open-source at 24B class.
#
#   Devstral 2 — 123B params: smallest GGUF is ~100+ GB. Multi-GPU server
#             hardware required. Not included in this conf.
#
# Key capabilities vs. Devstral Small 1.1 (2507):
#   - Vision: image input re-enabled (removed in 1.1, back in Small 2)
#   - Context: 256k tokens (up from 128k)
#   - Architecture: Ministral-3 style with ScalableSoftmax attention
#   - Tooling: Mistral function-calling format; Mistral Vibe CLI support
#   - Benchmarks: +21.2% SWE-Bench Verified vs 1.1 (68.0% vs 46.8%)
#
# License: Apache 2.0
#
# Every setting can be overridden by exporting the variable before invoking
# ai-coder — the ${VAR:-default} pattern means the env var wins when set.

# Guard against double-sourcing
[ "${_AI_CODER_DEVSTRAL2_CONF_LOADED:-}" = "1" ] && return 0
readonly _AI_CODER_DEVSTRAL2_CONF_LOADED=1

# --- [ MODEL FAMILY ] ---------------------------------------------------------

# Display name shown in the family selection menu, status messages, and logs.
MODEL_FAMILY="${MODEL_FAMILY:-Devstral 2}"

# KV cache quantization — q8_0 is fine; Devstral 2 Small fits within tier VRAM.
MODEL_KV_TYPE="${MODEL_KV_TYPE:-q8_0}"

# Jinja chat template — use the model's built-in Jinja template for prompt formatting.
# Devstral 2 uses Mistral's JSON function-calling format; --jinja is safe and recommended.
MODEL_JINJA="${MODEL_JINJA:-true}"

# No speculative-decoding draft wired: no small model shares the Devstral 2
# tokenizer. Define MODEL_DRAFT_FILE/URL manually if one appears.

# --- [ TIER MODEL DEFINITIONS ] -----------------------------------------------
# Each tier has these variables:
#   MODEL_<tier>_FILE  — filename stored under MODEL_STORAGE_DIR
#   MODEL_<tier>_URL   — direct GGUF download URL
#   MODEL_N_DESC  — human-readable label shown in logs and menus
#   MODEL_N_SHA256 — expected sha256, verified after download (blank = skip)
#
# Models listed best-quality-first. select_model_for_vram() picks the first
# whose MODEL_N_WEIGHTS_GB ≤ EFFECTIVE_VRAM_GB (total VRAM minus KV-cache and
# draft reserve). Set MODEL_N_WEIGHTS_GB=0 on the last entry — it is always
# selected as the unconditional fallback.
#
# Sizes sourced from unsloth hardware compatibility table (December 2025):
#   Q8_0       = 25.1 GB
#   Q6_K       = 19.3 GB
#   Q4_K_M     = 14.3 GB
#   Q3_K_M     = 11.5 GB
#   UD-IQ2_XXS =  6.75 GB
MODEL_COUNT="${MODEL_COUNT:-5}"

# 1 — Q8_0: 25.1 GB; near-lossless 8-bit, maximum quality; fits 32GB+
MODEL_1_FILE="${MODEL_1_FILE:-Devstral-Small-2-24B-Instruct-2512-Q8_0.gguf}"
MODEL_1_URL="${MODEL_1_URL:-https://huggingface.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF/resolve/main/Devstral-Small-2-24B-Instruct-2512-Q8_0.gguf}"
MODEL_1_SHA256="${MODEL_1_SHA256:-0760502e9228234f6cfa843f8870b8fc91c46a13664cf766c639229cccc80866}"
MODEL_1_DESC="${MODEL_1_DESC:-Devstral Small 2 Q8_0 (~25.1GB)}"
MODEL_1_WEIGHTS_GB="${MODEL_1_WEIGHTS_GB:-26}"

# 2 — Q6_K: 19.3 GB; near-lossless 6-bit; fits 26GB+
MODEL_2_FILE="${MODEL_2_FILE:-Devstral-Small-2-24B-Instruct-2512-Q6_K.gguf}"
MODEL_2_URL="${MODEL_2_URL:-https://huggingface.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF/resolve/main/Devstral-Small-2-24B-Instruct-2512-Q6_K.gguf}"
MODEL_2_SHA256="${MODEL_2_SHA256:-b04b3e19730d7a1e19530f40b947b69c028b090cb7c58c1515cf1fc2ece5f821}"
MODEL_2_DESC="${MODEL_2_DESC:-Devstral Small 2 Q6_K (~19.3GB)}"
MODEL_2_WEIGHTS_GB="${MODEL_2_WEIGHTS_GB:-20}"

# 3 — Q4_K_M: 14.3 GB; standard 4-bit sweet spot; fits 21GB+
MODEL_3_FILE="${MODEL_3_FILE:-Devstral-Small-2-24B-Instruct-2512-Q4_K_M.gguf}"
MODEL_3_URL="${MODEL_3_URL:-https://huggingface.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF/resolve/main/Devstral-Small-2-24B-Instruct-2512-Q4_K_M.gguf}"
MODEL_3_SHA256="${MODEL_3_SHA256:-d14ba9edee1bb4c4996a726deb81e49ae81800a3216f0774634238c380aee496}"
MODEL_3_DESC="${MODEL_3_DESC:-Devstral Small 2 Q4_K_M (~14.3GB)}"
MODEL_3_WEIGHTS_GB="${MODEL_3_WEIGHTS_GB:-15}"

# 4 — Q3_K_M: 11.5 GB; improved quality over 2-bit; fits 18GB+
MODEL_4_FILE="${MODEL_4_FILE:-Devstral-Small-2-24B-Instruct-2512-Q3_K_M.gguf}"
MODEL_4_URL="${MODEL_4_URL:-https://huggingface.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF/resolve/main/Devstral-Small-2-24B-Instruct-2512-Q3_K_M.gguf}"
MODEL_4_SHA256="${MODEL_4_SHA256:-53466aa3e486e6f0068c2593d12aeb15fb079c1dfe443ab922c468c39761bd16}"
MODEL_4_DESC="${MODEL_4_DESC:-Devstral Small 2 Q3_K_M (~11.5GB)}"
MODEL_4_WEIGHTS_GB="${MODEL_4_WEIGHTS_GB:-12}"

# 5 — UD-IQ2_XXS: 6.75 GB; unconditional fallback (WEIGHTS_GB=0)
MODEL_5_FILE="${MODEL_5_FILE:-Devstral-Small-2-24B-Instruct-2512-UD-IQ2_XXS.gguf}"
MODEL_5_URL="${MODEL_5_URL:-https://huggingface.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF/resolve/main/Devstral-Small-2-24B-Instruct-2512-UD-IQ2_XXS.gguf}"
MODEL_5_SHA256="${MODEL_5_SHA256:-40e93f2c700057860a4917552589d27119127070405cde3e7ed1c7f9ba4fc6db}"
MODEL_5_DESC="${MODEL_5_DESC:-Devstral Small 2 UD-IQ2_XXS (~6.75GB, fallback)}"
MODEL_5_WEIGHTS_GB="${MODEL_5_WEIGHTS_GB:-0}"
