#!/bin/bash
# ==============================================================================
# LLAMA4.CONF | Llama 4 Model Family Configuration
# ==============================================================================
# Defines the model family identity and per-VRAM-tier model files for Llama 4.
# Sourced by ai-coder after family selection, following config/ai-coder-model.conf.
#
# Llama 4 (released April 2025 by Meta) is a natively multimodal MoE family.
# Two models exist; only one is practical for consumer hardware:
#
#   Scout  — Llama 4 Scout 17B×16E (17B active / 109B total):
#            The consumer-feasible option. 16 experts, 10M token context window.
#            Smallest GGUF: UD-TQ1_0 at 29.3 GB — fits in 32GB VRAM.
#
#   Maverick — Llama 4 Maverick 17B×128E (17B active / 400B total):
#            128 experts, smallest GGUF is ~106 GB. Requires multi-GPU server
#            hardware. Not included in this conf.
#
# IMPORTANT — VRAM requirements:
#   Llama 4 Scout is a large model by consumer standards. The smallest quant
#   (UD-TQ1_0) is 29.3 GB. It fits in 32GB VRAM with ~2.7 GB headroom for
#   KV cache. On cards with less than 32GB, llama.cpp will partial-offload
#   layers to system RAM — the model will run but inference will be slow, as
#   each offloaded layer crosses the PCIe bus every token.
#   Rough layer counts on GPU for UD-TQ1_0 (109 layers total):
#     8GB  → ~10 layers on GPU  (very slow, mostly CPU)
#     12GB → ~16 layers on GPU
#     16GB → ~22 layers on GPU
#     24GB → ~50 layers on GPU  (acceptable hybrid speed)
#     32GB → all layers on GPU  (full acceleration)
#
#   The 24GB tier uses UD-IQ2_XXS (37.4 GB) for higher model quality, accepting
#   that ~12 GB of overflow will be offloaded to RAM.
#
# Both text and image input are supported (early-fusion multimodal architecture).
# Knowledge cutoff: August 2024. 12 supported languages.
# License: Llama 4 Community License (custom commercial licence from Meta).
#
# Every setting can be overridden by exporting the variable before invoking
# ai-coder — the ${VAR:-default} pattern means the env var wins when set.

# Guard against double-sourcing
[ "${_AI_CODER_LLAMA4_CONF_LOADED:-}" = "1" ] && return 0
readonly _AI_CODER_LLAMA4_CONF_LOADED=1

# --- [ MODEL FAMILY ] ---------------------------------------------------------

# Display name shown in the family selection menu, status messages, and logs.
MODEL_FAMILY="${MODEL_FAMILY:-Llama 4}"

# Filename substring matched when scanning ~/ai-models for a compatible GGUF.
# "llama-4" distinguishes from Llama 3 files which match "llama" alone.
MODEL_FILE_PATTERN="${MODEL_FILE_PATTERN:-llama-4}"

# KV cache quantization — q4_0 required: Scout UD-TQ1_0 is 29.3 GB, leaving
# insufficient VRAM for q8_0 KV cache even on 32GB. q4_0 halves the cost.
MODEL_KV_TYPE="${MODEL_KV_TYPE:-q4_0}"

# --- [ TIER MODEL DEFINITIONS ] -----------------------------------------------
# Each tier has three variables:
#   MODEL_<tier>_FILE  — filename stored under MODEL_STORAGE_DIR
#   MODEL_<tier>_URL   — direct GGUF download URL
#   MODEL_<tier>_DESC  — human-readable description shown during download
#
# All tiers use Llama 4 Scout, the only consumer-feasible Llama 4 model.
# Sizes sourced from unsloth hardware compatibility table (April 2025):
#   Scout UD-TQ1_0   = 29.3 GB  (1.78-bit dynamic quant, minimum viable)
#   Scout UD-IQ2_XXS = 37.4 GB  (2.42-bit, better quality at cost of VRAM)

# 8GB tier: Scout UD-TQ1_0 — 29.3 GB; most layers on CPU, inference is slow
MODEL_8GB_FILE="${MODEL_8GB_FILE:-Llama-4-Scout-17B-16E-Instruct-UD-TQ1_0.gguf}"
MODEL_8GB_URL="${MODEL_8GB_URL:-https://huggingface.co/unsloth/Llama-4-Scout-17B-16E-Instruct-GGUF/resolve/main/Llama-4-Scout-17B-16E-Instruct-UD-TQ1_0.gguf}"
MODEL_8GB_DESC="${MODEL_8GB_DESC:-Llama 4 Scout UD-TQ1_0 (8GB tier; 29.3GB, mostly CPU offload)}"

# 12GB tier: Scout UD-TQ1_0 — same file, ~16 layers on GPU
MODEL_12GB_FILE="${MODEL_12GB_FILE:-Llama-4-Scout-17B-16E-Instruct-UD-TQ1_0.gguf}"
MODEL_12GB_URL="${MODEL_12GB_URL:-https://huggingface.co/unsloth/Llama-4-Scout-17B-16E-Instruct-GGUF/resolve/main/Llama-4-Scout-17B-16E-Instruct-UD-TQ1_0.gguf}"
MODEL_12GB_DESC="${MODEL_12GB_DESC:-Llama 4 Scout UD-TQ1_0 (12GB tier; 29.3GB, heavy CPU offload)}"

# 16GB tier: Scout UD-TQ1_0 — same file, ~22 layers on GPU
MODEL_16GB_FILE="${MODEL_16GB_FILE:-Llama-4-Scout-17B-16E-Instruct-UD-TQ1_0.gguf}"
MODEL_16GB_URL="${MODEL_16GB_URL:-https://huggingface.co/unsloth/Llama-4-Scout-17B-16E-Instruct-GGUF/resolve/main/Llama-4-Scout-17B-16E-Instruct-UD-TQ1_0.gguf}"
MODEL_16GB_DESC="${MODEL_16GB_DESC:-Llama 4 Scout UD-TQ1_0 (16GB tier; 29.3GB, partial CPU offload)}"

# 24GB tier: Scout UD-IQ2_XXS — 37.4 GB; better quality, ~25 layers on GPU
MODEL_24GB_FILE="${MODEL_24GB_FILE:-Llama-4-Scout-17B-16E-Instruct-UD-IQ2_XXS.gguf}"
MODEL_24GB_URL="${MODEL_24GB_URL:-https://huggingface.co/unsloth/Llama-4-Scout-17B-16E-Instruct-GGUF/resolve/main/Llama-4-Scout-17B-16E-Instruct-UD-IQ2_XXS.gguf}"
MODEL_24GB_DESC="${MODEL_24GB_DESC:-Llama 4 Scout UD-IQ2_XXS (24GB tier; 37.4GB, hybrid GPU+CPU)}"

# 32GB tier: Scout UD-TQ1_0 — 29.3 GB; fits fully in VRAM, full GPU speed
MODEL_32GB_FILE="${MODEL_32GB_FILE:-Llama-4-Scout-17B-16E-Instruct-UD-TQ1_0.gguf}"
MODEL_32GB_URL="${MODEL_32GB_URL:-https://huggingface.co/unsloth/Llama-4-Scout-17B-16E-Instruct-GGUF/resolve/main/Llama-4-Scout-17B-16E-Instruct-UD-TQ1_0.gguf}"
MODEL_32GB_DESC="${MODEL_32GB_DESC:-Llama 4 Scout UD-TQ1_0 (32GB tier; 29.3GB, full GPU)}"
