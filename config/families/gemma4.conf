#!/bin/bash
# ==============================================================================
# GEMMA4.CONF | Gemma 4 Model Family Configuration
# ==============================================================================
# Defines the model family identity and per-VRAM-tier model files for Gemma 4.
# Sourced by ai-coder after family selection, following config/ai-coder-model.conf.
#
# To add a new model family, create a new .conf file in this directory using
# this file as a template. It will be auto-discovered by the family selection
# menu on next run (or immediately with --menu).
#
# Every setting can be overridden by exporting the variable before invoking
# ai-coder — the ${VAR:-default} pattern means the env var wins when set.

# Guard against double-sourcing
[ "${_AI_CODER_GEMMA4_CONF_LOADED:-}" = "1" ] && return 0
readonly _AI_CODER_GEMMA4_CONF_LOADED=1

# --- [ MODEL FAMILY ] ---------------------------------------------------------

# Display name shown in the family selection menu, status messages, and logs.
MODEL_FAMILY="${MODEL_FAMILY:-Gemma 4}"

# KV cache quantization — q8_0 is fine; Gemma 4 models fit well within their tier VRAM.
MODEL_KV_TYPE="${MODEL_KV_TYPE:-q8_0}"

# Jinja chat template — use the model's built-in Jinja template for prompt formatting.
# Gemma 4's template produces standard JSON tool calls; --jinja is safe and recommended.
MODEL_JINJA="${MODEL_JINJA:-true}"

# No speculative-decoding draft wired: the smallest gemma-4 (E2B, ~2B
# effective) is too large to pay off as a draft. Define MODEL_DRAFT_FILE/URL
# manually if a sub-1B gemma-4 model appears.

# --- [ TIER MODEL DEFINITIONS ] -----------------------------------------------
# Each tier has these variables:
#   MODEL_N_DESC  — human-readable label shown in logs and menus
#   MODEL_N_SHA256 — expected sha256, verified after download (blank = skip)
#
# Models listed best-quality-first. The last entry (MODEL_N_WEIGHTS_GB=0) is the
# unconditional fallback.
#
# Sizes sourced from unsloth HuggingFace repos:
#   31B  Q6_K           = 25.2  GB
#   31B  Q5_K_M         = 21.7  GB
#   31B  Q4_K_M         = 18.3  GB
#   26B-A4B UD-Q4_K_M   = 16.9  GB
#   26B-A4B UD-IQ4_XS   = 13.6  GB
#   26B-A4B UD-Q3_K_M   = 12.7  GB
#   12B  Q5_K_M         =  8.41 GB
#   E2B  Q4_K_M         =  3.11 GB
MODEL_COUNT="${MODEL_COUNT:-8}"

# 1 — 31B Q6_K: 25.2 GB; dense near-lossless 6-bit; fits 32GB+
MODEL_1_FILE="${MODEL_1_FILE:-gemma-4-31B-it-Q6_K.gguf}"
MODEL_1_URL="${MODEL_1_URL:-https://huggingface.co/unsloth/gemma-4-31B-it-GGUF/resolve/main/gemma-4-31B-it-Q6_K.gguf}"
MODEL_1_SHA256="${MODEL_1_SHA256:-abd0be03a2bc3f3c9d8e018cbb4ff5b553c340c65d49b6b346c48be5a1efde28}"
MODEL_1_DESC="${MODEL_1_DESC:-Gemma-4 31B Q6_K (~25.2GB)}"
MODEL_1_WEIGHTS_GB="${MODEL_1_WEIGHTS_GB:-26}"

# 2 — 31B Q5_K_M: 21.7 GB; dense 5-bit; fits 28GB+
MODEL_2_FILE="${MODEL_2_FILE:-gemma-4-31B-it-Q5_K_M.gguf}"
MODEL_2_URL="${MODEL_2_URL:-https://huggingface.co/unsloth/gemma-4-31B-it-GGUF/resolve/main/gemma-4-31B-it-Q5_K_M.gguf}"
MODEL_2_SHA256="${MODEL_2_SHA256:-a67da2acb852c31eed0325ddb5158070b70b025a601b2f7b8ed4ee7abde673e9}"
MODEL_2_DESC="${MODEL_2_DESC:-Gemma-4 31B Q5_K_M (~21.7GB)}"
MODEL_2_WEIGHTS_GB="${MODEL_2_WEIGHTS_GB:-22}"

# 3 — 31B Q4_K_M: 18.3 GB; dense 4-bit; fits 25GB+
MODEL_3_FILE="${MODEL_3_FILE:-gemma-4-31B-it-Q4_K_M.gguf}"
MODEL_3_URL="${MODEL_3_URL:-https://huggingface.co/unsloth/gemma-4-31B-it-GGUF/resolve/main/gemma-4-31B-it-Q4_K_M.gguf}"
MODEL_3_SHA256="${MODEL_3_SHA256:-9fdf3dc8b0384830b4402d151388c140bd8eb2abf8d60588d8224231198254a1}"
MODEL_3_DESC="${MODEL_3_DESC:-Gemma-4 31B Q4_K_M (~18.3GB)}"
MODEL_3_WEIGHTS_GB="${MODEL_3_WEIGHTS_GB:-19}"

# 4 — 26B-A4B UD-Q4_K_M: 16.9 GB; MoE (3.8B active), Q4_K_M quality; fits 23GB+ (3090/4090)
MODEL_4_FILE="${MODEL_4_FILE:-gemma-4-26B-A4B-it-UD-Q4_K_M.gguf}"
MODEL_4_URL="${MODEL_4_URL:-https://huggingface.co/unsloth/gemma-4-26B-A4B-it-GGUF/resolve/main/gemma-4-26B-A4B-it-UD-Q4_K_M.gguf}"
MODEL_4_SHA256="${MODEL_4_SHA256:-34c746b1d50ab813e29cd46c4796e3f43c741901a582f93a67b55b9fc9687b35}"
MODEL_4_DESC="${MODEL_4_DESC:-Gemma-4 26B A4B UD-Q4_K_M (~16.9GB)}"
MODEL_4_WEIGHTS_GB="${MODEL_4_WEIGHTS_GB:-17}"

# 5 — 26B-A4B UD-IQ4_XS: 13.6 GB; MoE (3.8B active), near-4B speed; fits 20GB+
MODEL_5_FILE="${MODEL_5_FILE:-gemma-4-26B-A4B-it-UD-IQ4_XS.gguf}"
MODEL_5_URL="${MODEL_5_URL:-https://huggingface.co/unsloth/gemma-4-26B-A4B-it-GGUF/resolve/main/gemma-4-26B-A4B-it-UD-IQ4_XS.gguf}"
MODEL_5_SHA256="${MODEL_5_SHA256:-694a7d2a3b994655db30c8eff7f77933357efed36c6551afb68d14a07484fde5}"
MODEL_5_DESC="${MODEL_5_DESC:-Gemma-4 26B A4B UD-IQ4_XS (~13.6GB)}"
MODEL_5_WEIGHTS_GB="${MODEL_5_WEIGHTS_GB:-14}"

# 6 — 26B-A4B UD-Q3_K_M: 12.7 GB; MoE 3-bit; fits 19GB+
MODEL_6_FILE="${MODEL_6_FILE:-gemma-4-26B-A4B-it-UD-Q3_K_M.gguf}"
MODEL_6_URL="${MODEL_6_URL:-https://huggingface.co/unsloth/gemma-4-26B-A4B-it-GGUF/resolve/main/gemma-4-26B-A4B-it-UD-Q3_K_M.gguf}"
MODEL_6_SHA256="${MODEL_6_SHA256:-985f740c7b928d15ecd8bf2bf4506d12ae6080c488f11eb8a4a97b215274bf7d}"
MODEL_6_DESC="${MODEL_6_DESC:-Gemma-4 26B A4B UD-Q3_K_M (~12.7GB)}"
MODEL_6_WEIGHTS_GB="${MODEL_6_WEIGHTS_GB:-13}"

# 7 — 12B Q5_K_M: 8.41 GB; unified multimodal dense; fits 15GB+ (4080)
MODEL_7_FILE="${MODEL_7_FILE:-gemma-4-12b-it-Q5_K_M.gguf}"
MODEL_7_URL="${MODEL_7_URL:-https://huggingface.co/unsloth/gemma-4-12b-it-GGUF/resolve/main/gemma-4-12b-it-Q5_K_M.gguf}"
MODEL_7_SHA256="${MODEL_7_SHA256:-1bc633ec98817858bec10f73fa026481c9662449aae4b80a05dfb28ef784c278}"
MODEL_7_DESC="${MODEL_7_DESC:-Gemma-4 12B Q5_K_M (~8.41GB)}"
MODEL_7_WEIGHTS_GB="${MODEL_7_WEIGHTS_GB:-9}"

# 8 — E2B Q4_K_M: 3.11 GB; unconditional fallback (WEIGHTS_GB=0)
MODEL_8_FILE="${MODEL_8_FILE:-gemma-4-E2B-it-Q4_K_M.gguf}"
MODEL_8_URL="${MODEL_8_URL:-https://huggingface.co/unsloth/gemma-4-E2B-it-GGUF/resolve/main/gemma-4-E2B-it-Q4_K_M.gguf}"
MODEL_8_SHA256="${MODEL_8_SHA256:-9378bc471710229ef165709b62e34bfb62231420ddaf6d729e727305b5b8672d}"
MODEL_8_DESC="${MODEL_8_DESC:-Gemma-4 E2B Q4_K_M (~3.11GB, fallback)}"
MODEL_8_WEIGHTS_GB="${MODEL_8_WEIGHTS_GB:-0}"
