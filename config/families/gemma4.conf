#!/bin/bash
# ==============================================================================
# GEMMA4.CONF | Gemma 4 Model Family Configuration
# ==============================================================================
# Defines the model family identity and per-VRAM-tier model files for Gemma 4.
# Sourced by ai-coder after family selection, following config/ai-coder-model.conf.
#
# To add a new model family, create a new .conf file in this directory using
# this file as a template. It will be auto-discovered by the family selection
# menu on next run (or immediately with --menu).
#
# Every setting can be overridden by exporting the variable before invoking
# ai-coder — the ${VAR:-default} pattern means the env var wins when set.

# Guard against double-sourcing
[ "${_AI_CODER_GEMMA4_CONF_LOADED:-}" = "1" ] && return 0
readonly _AI_CODER_GEMMA4_CONF_LOADED=1

# --- [ MODEL FAMILY ] ---------------------------------------------------------

# Display name shown in the family selection menu, status messages, and logs.
MODEL_FAMILY="${MODEL_FAMILY:-Gemma 4}"

# KV cache quantization — q8_0 is fine; Gemma 4 models fit well within their tier VRAM.
MODEL_KV_TYPE="${MODEL_KV_TYPE:-q8_0}"

# Jinja chat template — use the model's built-in Jinja template for prompt formatting.
# Gemma 4's template produces standard JSON tool calls; --jinja is safe and recommended.
MODEL_JINJA="${MODEL_JINJA:-true}"

# --- [ TIER MODEL DEFINITIONS ] -----------------------------------------------
# Each tier has these variables:
#   MODEL_<tier>_FILE  — filename stored under MODEL_STORAGE_DIR
#   MODEL_<tier>_URL   — direct GGUF download URL
#   MODEL_<tier>_DESC  — human-readable description shown during download
#   MODEL_<tier>_SHA256 — expected sha256, verified after download (blank = skip)

MODEL_8GB_FILE="${MODEL_8GB_FILE:-gemma-4-E2B-it-Q4_K_M.gguf}"
MODEL_8GB_URL="${MODEL_8GB_URL:-https://huggingface.co/unsloth/gemma-4-E2B-it-GGUF/resolve/main/gemma-4-E2B-it-Q4_K_M.gguf}"
MODEL_8GB_SHA256="${MODEL_8GB_SHA256:-9378bc471710229ef165709b62e34bfb62231420ddaf6d729e727305b5b8672d}"
MODEL_8GB_DESC="${MODEL_8GB_DESC:-Gemma-4 E2B Q4_K_M (8GB tier)}"

MODEL_12GB_FILE="${MODEL_12GB_FILE:-gemma-4-12b-it-Q4_K_M.gguf}"
MODEL_12GB_URL="${MODEL_12GB_URL:-https://huggingface.co/unsloth/gemma-4-12b-it-GGUF/resolve/main/gemma-4-12b-it-Q4_K_M.gguf}"
MODEL_12GB_SHA256="${MODEL_12GB_SHA256:-43fec98c5102b1c446b4ddd0a9439f1db3a2e1f2e0b8cd143ce1ea619a9403d6}"
MODEL_12GB_DESC="${MODEL_12GB_DESC:-Gemma-4 12B Q4_K_M (12GB tier)}"

MODEL_16GB_FILE="${MODEL_16GB_FILE:-gemma-4-26B-A4B-it-UD-IQ4_XS.gguf}"
MODEL_16GB_URL="${MODEL_16GB_URL:-https://huggingface.co/unsloth/gemma-4-26B-A4B-it-GGUF/resolve/main/gemma-4-26B-A4B-it-UD-IQ4_XS.gguf}"
MODEL_16GB_SHA256="${MODEL_16GB_SHA256:-694a7d2a3b994655db30c8eff7f77933357efed36c6551afb68d14a07484fde5}"
MODEL_16GB_DESC="${MODEL_16GB_DESC:-Gemma-4 26B A4B UD-IQ4_XS (16GB tier)}"

MODEL_24GB_FILE="${MODEL_24GB_FILE:-google_gemma-4-26B-A4B-it-Q5_K_M.gguf}"
MODEL_24GB_URL="${MODEL_24GB_URL:-https://huggingface.co/bartowski/google_gemma-4-26B-A4B-it-GGUF/resolve/main/google_gemma-4-26B-A4B-it-Q5_K_M.gguf}"
MODEL_24GB_SHA256="${MODEL_24GB_SHA256:-948330216e3cf5aab7c995ffcb9530b1a76dec35a4ce1134db9dd0c1fab96e6b}"
MODEL_24GB_DESC="${MODEL_24GB_DESC:-Gemma-4 26B A4B Q5_K_M (24GB tier)}"

MODEL_32GB_FILE="${MODEL_32GB_FILE:-gemma-4-31B-it-Q5_K_M.gguf}"
MODEL_32GB_URL="${MODEL_32GB_URL:-https://huggingface.co/unsloth/gemma-4-31B-it-GGUF/resolve/main/gemma-4-31B-it-Q5_K_M.gguf}"
MODEL_32GB_SHA256="${MODEL_32GB_SHA256:-a67da2acb852c31eed0325ddb5158070b70b025a601b2f7b8ed4ee7abde673e9}"
MODEL_32GB_DESC="${MODEL_32GB_DESC:-Gemma-4 31B Q5_K_M (32GB tier)}"
