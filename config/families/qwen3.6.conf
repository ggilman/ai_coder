#!/bin/bash
# ==============================================================================
# QWEN3.6.CONF | Qwen3.6 Model Family Configuration
# ==============================================================================
# Defines the model family identity and per-VRAM-tier model files for Qwen3.6.
# Sourced by ai-coder after family selection, following config/ai-coder-model.conf.
#
# Qwen3.6 (released April 2026) is an agentic coding-focused multimodal family
# with two distinct models:
#
#   Dense  — Qwen3.6-27B (27B params): standard dense model, flagship-level
#            coding quality, used here for the 8GB tier as the smallest option.
#
#   MoE    — Qwen3.6-35B-A3B (35B total / 3B active): Mixture-of-Experts with
#            a novel Gated DeltaNet + Attention hybrid layout. Only 3B parameters
#            are activated per token, giving near-8B inference speed with
#            significantly higher quality. Used for the 12GB–32GB tiers.
#
# IMPORTANT — 8GB tier caveat:
#   Neither Qwen3.6 model fits comfortably in 8GB VRAM. The 27B UD-IQ2_XXS
#   quant is ~9.4 GB on disk. It can run on 8GB cards only if llama.cpp offloads
#   some layers to RAM via --n-gpu-layers. Full GPU acceleration requires ≥10GB.
#
# Context length: 262,144 tokens natively; extensible to 1,010,000 via YaRN.
#
# Thinking behaviour:
#   Unlike Qwen3, Qwen3.6 does NOT support /think and /nothink soft switches.
#   The model thinks by default. To disable, pass enable_thinking: false in the
#   API request body. The new "Preserve Thinking" feature retains reasoning
#   context across turns for improved agentic performance.
#
# All models include a vision encoder (image + video input supported).
#
# Every setting can be overridden by exporting the variable before invoking
# ai-coder — the ${VAR:-default} pattern means the env var wins when set.

# Guard against double-sourcing
[ "${_AI_CODER_QWEN36_CONF_LOADED:-}" = "1" ] && return 0
readonly _AI_CODER_QWEN36_CONF_LOADED=1

# --- [ MODEL FAMILY ] ---------------------------------------------------------

# Display name shown in the family selection menu, status messages, and logs.
MODEL_FAMILY="${MODEL_FAMILY:-Qwen3.6}"

# KV cache quantization — q8_0 is fine; all Qwen3.6 tiers fit within their VRAM budget.
MODEL_KV_TYPE="${MODEL_KV_TYPE:-q8_0}"

# Jinja chat template — use the model's built-in Jinja template for prompt formatting.
# Qwen3.6's template produces standard JSON tool calls; --jinja is safe and recommended.
MODEL_JINJA="${MODEL_JINJA:-true}"

# Thinking mode — disabled by default for agent use: reasoning tokens before
# every tool call make agent loops sluggish. (Qwen3.6 has no /think soft
# switches, so this server-side toggle is the only control.)
# Set MODEL_THINKING=true to re-enable for harder planning-heavy tasks.
MODEL_THINKING="${MODEL_THINKING:-true}"

# No speculative-decoding draft wired: no small Qwen3.6 dense model exists.
# unsloth publishes Qwen3.6 *-MTP-GGUF repos (multi-token prediction weights),
# but MTP uses a different mechanism than --model-draft and isn't wired here.
# Define MODEL_DRAFT_FILE/URL manually if a compatible small model appears.

# --- [ TIER MODEL DEFINITIONS ] -----------------------------------------------
# Each tier has these variables:
#   MODEL_N_DESC  — human-readable label shown in logs and menus
#   MODEL_N_SHA256 — expected sha256, verified after download (blank = skip)
#
# Models listed best-quality-first. The last entry (MODEL_N_WEIGHTS_GB=0) is the
# unconditional fallback.
#
# Sizes sourced from unsloth hardware compatibility tables (April 2026):
#   35B-A3B UD-Q6_K    = 29.3 GB  (MoE, 3B active)
#   35B-A3B UD-Q5_K_S  = 24.9 GB  (MoE)
#   35B-A3B UD-Q4_K_M  = 22.1 GB  (MoE)
#   35B-A3B UD-IQ4_XS  = 17.7 GB  (MoE)
#   35B-A3B UD-Q3_K_S  = 15.4 GB  (MoE)
#   35B-A3B UD-IQ2_XXS = 10.8 GB  (MoE)
#   27B UD-IQ2_XXS     =  9.39 GB  (dense, fallback)
MODEL_COUNT="${MODEL_COUNT:-7}"

# 1 — 35B-A3B UD-Q6_K: 29.3 GB; near-lossless 6-bit MoE; fits 36GB+
MODEL_1_FILE="${MODEL_1_FILE:-Qwen3.6-35B-A3B-UD-Q6_K.gguf}"
MODEL_1_URL="${MODEL_1_URL:-https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q6_K.gguf}"
MODEL_1_SHA256="${MODEL_1_SHA256:-4fe53b148b46f9b88830e2a3055c5b15c3a4d1e3ddc9a1384a108d8b9d59f043}"
MODEL_1_DESC="${MODEL_1_DESC:-Qwen3.6 35B-A3B UD-Q6_K MoE (~29.3GB)}"
MODEL_1_WEIGHTS_GB="${MODEL_1_WEIGHTS_GB:-30}"

# 2 — 35B-A3B UD-Q5_K_S: 24.9 GB; 5-bit MoE; fits 31GB+ (big win for 32GB cards)
MODEL_2_FILE="${MODEL_2_FILE:-Qwen3.6-35B-A3B-UD-Q5_K_S.gguf}"
MODEL_2_URL="${MODEL_2_URL:-https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q5_K_S.gguf}"
MODEL_2_SHA256="${MODEL_2_SHA256:-31d886cbd8c3db2e66f4366cbfed93389cb982bdced1caa37262befdb34f5715}"
MODEL_2_DESC="${MODEL_2_DESC:-Qwen3.6 35B-A3B UD-Q5_K_S MoE (~24.9GB)}"
MODEL_2_WEIGHTS_GB="${MODEL_2_WEIGHTS_GB:-25}"

# 3 — 35B-A3B UD-Q4_K_M: 22.1 GB; standard 4-bit MoE sweet spot; fits 29GB+
MODEL_3_FILE="${MODEL_3_FILE:-Qwen3.6-35B-A3B-UD-Q4_K_M.gguf}"
MODEL_3_URL="${MODEL_3_URL:-https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf}"
MODEL_3_SHA256="${MODEL_3_SHA256:-ac0e2c1189e055faa36eff361580e79c5bd6f8e76bffb4ce547f167d53e31a61}"
MODEL_3_DESC="${MODEL_3_DESC:-Qwen3.6 35B-A3B UD-Q4_K_M MoE (~22.1GB)}"
MODEL_3_WEIGHTS_GB="${MODEL_3_WEIGHTS_GB:-23}"

# 4 — 35B-A3B UD-IQ4_XS: 17.7 GB; 4-bit MoE; fits 24GB+ (big win for 3090/4090)
MODEL_4_FILE="${MODEL_4_FILE:-Qwen3.6-35B-A3B-UD-IQ4_XS.gguf}"
MODEL_4_URL="${MODEL_4_URL:-https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-IQ4_XS.gguf}"
MODEL_4_SHA256="${MODEL_4_SHA256:-649d7508507b84638732c4f52c24c8b15843c6dca2f3ff793ae07c14a67ebbb3}"
MODEL_4_DESC="${MODEL_4_DESC:-Qwen3.6 35B-A3B UD-IQ4_XS MoE (~17.7GB)}"
MODEL_4_WEIGHTS_GB="${MODEL_4_WEIGHTS_GB:-18}"

# 5 — 35B-A3B UD-Q3_K_S: 15.4 GB; improved 3-bit MoE quality; fits 22GB+
MODEL_5_FILE="${MODEL_5_FILE:-Qwen3.6-35B-A3B-UD-Q3_K_S.gguf}"
MODEL_5_URL="${MODEL_5_URL:-https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q3_K_S.gguf}"
MODEL_5_SHA256="${MODEL_5_SHA256:-212ccdf37d416167ce8dcd7e3a59bcd45b30ac7531822a1e7bb79bfbacb2d1aa}"
MODEL_5_DESC="${MODEL_5_DESC:-Qwen3.6 35B-A3B UD-Q3_K_S MoE (~15.4GB)}"
MODEL_5_WEIGHTS_GB="${MODEL_5_WEIGHTS_GB:-16}"

# 6 — 35B-A3B UD-IQ2_XXS: 10.8 GB; near-8B inference speed MoE; fits 17GB+
MODEL_6_FILE="${MODEL_6_FILE:-Qwen3.6-35B-A3B-UD-IQ2_XXS.gguf}"
MODEL_6_URL="${MODEL_6_URL:-https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-IQ2_XXS.gguf}"
MODEL_6_SHA256="${MODEL_6_SHA256:-2e8f5f705355c56311432d0a8a5d14a696dbb7e4b197d05c75ba805fc1857bef}"
MODEL_6_DESC="${MODEL_6_DESC:-Qwen3.6 35B-A3B UD-IQ2_XXS MoE (~10.8GB)}"
MODEL_6_WEIGHTS_GB="${MODEL_6_WEIGHTS_GB:-11}"

# 7 — 27B UD-IQ2_XXS: 9.39 GB; unconditional fallback (WEIGHTS_GB=0)
MODEL_7_FILE="${MODEL_7_FILE:-Qwen3.6-27B-UD-IQ2_XXS.gguf}"
MODEL_7_URL="${MODEL_7_URL:-https://huggingface.co/unsloth/Qwen3.6-27B-GGUF/resolve/main/Qwen3.6-27B-UD-IQ2_XXS.gguf}"
MODEL_7_SHA256="${MODEL_7_SHA256:-968bfc712832031afebec339da3ae61c6822ab9a118e1d72b6be2a7781a96e30}"
MODEL_7_DESC="${MODEL_7_DESC:-Qwen3.6 27B UD-IQ2_XXS (~9.39GB, fallback)}"
MODEL_7_WEIGHTS_GB="${MODEL_7_WEIGHTS_GB:-0}"
