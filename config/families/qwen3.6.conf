#!/bin/bash
# ==============================================================================
# QWEN3.6.CONF | Qwen3.6 Model Family Configuration
# ==============================================================================
# Defines the model family identity and per-VRAM-tier model files for Qwen3.6.
# Sourced by ai-coder after family selection, following config/ai-coder-model.conf.
#
# Qwen3.6 (released April 2026) is an agentic coding-focused multimodal family
# with two distinct models:
#
#   Dense  — Qwen3.6-27B (27B params): standard dense model, flagship-level
#            coding quality, used here for the 8GB tier as the smallest option.
#
#   MoE    — Qwen3.6-35B-A3B (35B total / 3B active): Mixture-of-Experts with
#            a novel Gated DeltaNet + Attention hybrid layout. Only 3B parameters
#            are activated per token, giving near-8B inference speed with
#            significantly higher quality. Used for the 12GB–32GB tiers.
#
# IMPORTANT — 8GB tier caveat:
#   Neither Qwen3.6 model fits comfortably in 8GB VRAM. The 27B UD-IQ2_XXS
#   quant is ~9.4 GB on disk. It can run on 8GB cards only if llama.cpp offloads
#   some layers to RAM via --n-gpu-layers. Full GPU acceleration requires ≥10GB.
#
# Context length: 262,144 tokens natively; extensible to 1,010,000 via YaRN.
#
# Thinking behaviour:
#   Unlike Qwen3, Qwen3.6 does NOT support /think and /nothink soft switches.
#   The model thinks by default. To disable, pass enable_thinking: false in the
#   API request body. The new "Preserve Thinking" feature retains reasoning
#   context across turns for improved agentic performance.
#
# All models include a vision encoder (image + video input supported).
#
# Every setting can be overridden by exporting the variable before invoking
# ai-coder — the ${VAR:-default} pattern means the env var wins when set.

# Guard against double-sourcing
[ "${_AI_CODER_QWEN36_CONF_LOADED:-}" = "1" ] && return 0
readonly _AI_CODER_QWEN36_CONF_LOADED=1

# --- [ MODEL FAMILY ] ---------------------------------------------------------

# Display name shown in the family selection menu, status messages, and logs.
MODEL_FAMILY="${MODEL_FAMILY:-Qwen3.6}"

# Filename substring matched when scanning ~/ai-models for a compatible GGUF.
# Used as a case-insensitive grep pattern.
MODEL_FILE_PATTERN="${MODEL_FILE_PATTERN:-qwen3.6}"

# KV cache quantization — q8_0 is fine; all Qwen3.6 tiers fit within their VRAM budget.
MODEL_KV_TYPE="${MODEL_KV_TYPE:-q8_0}"

# --- [ TIER MODEL DEFINITIONS ] -----------------------------------------------
# Each tier has three variables:
#   MODEL_<tier>_FILE  — filename stored under MODEL_STORAGE_DIR
#   MODEL_<tier>_URL   — direct GGUF download URL
#   MODEL_<tier>_DESC  — human-readable description shown during download
#
# Sizes sourced from unsloth hardware compatibility tables (April 2026):
#   27B  UD-IQ2_XXS = 9.39 GB  (dense)
#   35B-A3B UD-IQ2_XXS = 10.8 GB  (MoE)
#   35B-A3B UD-Q3_K_S  = 15.4 GB  (MoE)
#   35B-A3B UD-Q4_K_M  = 22.1 GB  (MoE)
#   35B-A3B UD-Q6_K    = 29.3 GB  (MoE)

# 8GB tier: Qwen3.6-27B UD-IQ2_XXS — 9.39 GB (dense; requires ~10GB actual VRAM)
MODEL_8GB_FILE="${MODEL_8GB_FILE:-Qwen3.6-27B-UD-IQ2_XXS.gguf}"
MODEL_8GB_URL="${MODEL_8GB_URL:-https://huggingface.co/unsloth/Qwen3.6-27B-GGUF/resolve/main/Qwen3.6-27B-UD-IQ2_XXS.gguf}"
MODEL_8GB_DESC="${MODEL_8GB_DESC:-Qwen3.6 27B UD-IQ2_XXS (8GB tier; ~9.4GB, requires 10GB VRAM)}"

# 12GB tier: Qwen3.6-35B-A3B UD-IQ2_XXS — 10.8 GB (MoE, near-8B inference speed)
MODEL_12GB_FILE="${MODEL_12GB_FILE:-Qwen3.6-35B-A3B-UD-IQ2_XXS.gguf}"
MODEL_12GB_URL="${MODEL_12GB_URL:-https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-IQ2_XXS.gguf}"
MODEL_12GB_DESC="${MODEL_12GB_DESC:-Qwen3.6 35B-A3B UD-IQ2_XXS MoE (12GB tier; ~10.8GB)}"

# 16GB tier: Qwen3.6-35B-A3B UD-Q3_K_S — 15.4 GB (MoE, improved 3-bit quality)
MODEL_16GB_FILE="${MODEL_16GB_FILE:-Qwen3.6-35B-A3B-UD-Q3_K_S.gguf}"
MODEL_16GB_URL="${MODEL_16GB_URL:-https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q3_K_S.gguf}"
MODEL_16GB_DESC="${MODEL_16GB_DESC:-Qwen3.6 35B-A3B UD-Q3_K_S MoE (16GB tier; ~15.4GB)}"

# 24GB tier: Qwen3.6-35B-A3B UD-Q4_K_M — 22.1 GB (MoE, standard 4-bit sweet spot)
MODEL_24GB_FILE="${MODEL_24GB_FILE:-Qwen3.6-35B-A3B-UD-Q4_K_M.gguf}"
MODEL_24GB_URL="${MODEL_24GB_URL:-https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf}"
MODEL_24GB_DESC="${MODEL_24GB_DESC:-Qwen3.6 35B-A3B UD-Q4_K_M MoE (24GB tier; ~22.1GB)}"

# 32GB tier: Qwen3.6-35B-A3B UD-Q6_K — 29.3 GB (MoE, near-lossless 6-bit)
MODEL_32GB_FILE="${MODEL_32GB_FILE:-Qwen3.6-35B-A3B-UD-Q6_K.gguf}"
MODEL_32GB_URL="${MODEL_32GB_URL:-https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q6_K.gguf}"
MODEL_32GB_DESC="${MODEL_32GB_DESC:-Qwen3.6 35B-A3B UD-Q6_K MoE (32GB tier; ~29.3GB)}"
