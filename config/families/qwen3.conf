#!/bin/bash
# ==============================================================================
# QWEN3.CONF | Qwen3 Model Family Configuration
# ==============================================================================
# Defines the model family identity and per-VRAM-tier model files for Qwen3.
# Sourced by ai-coder after family selection, following config/ai-coder-model.conf.
#
# Qwen3 offers two model types used here:
#   Dense  — Qwen3-8B (8.2B params): standard full-parameter model.
#   MoE    — Qwen3-30B-A3B (30.5B total / 3.3B active): Mixture-of-Experts model
#            that activates only 3.3B parameters per token, giving near-8B
#            inference speed with significantly higher quality.
#   Dense  — Qwen3-32B (32.8B params): high-quality dense model for 24/32GB tiers.
#
# All models support built-in thinking mode (/think, /no_think in the prompt).
#
# Every setting can be overridden by exporting the variable before invoking
# ai-coder — the ${VAR:-default} pattern means the env var wins when set.

# Guard against double-sourcing
[ "${_AI_CODER_QWEN3_CONF_LOADED:-}" = "1" ] && return 0
readonly _AI_CODER_QWEN3_CONF_LOADED=1

# --- [ MODEL FAMILY ] ---------------------------------------------------------

# Display name shown in the family selection menu, status messages, and logs.
MODEL_FAMILY="${MODEL_FAMILY:-Qwen3}"

# KV cache quantization — q8_0 is fine; all Qwen3 tiers fit within their VRAM budget.
MODEL_KV_TYPE="${MODEL_KV_TYPE:-q8_0}"

# Jinja chat template — use the model's built-in Jinja template for prompt formatting.
# Qwen3's template produces standard JSON tool calls; --jinja is safe and recommended.
MODEL_JINJA="${MODEL_JINJA:-true}"

# Thinking mode — disabled by default for agent use: Qwen3 emits hundreds of
# reasoning tokens before every tool call, which makes agent loops sluggish.
# Set MODEL_THINKING=true to re-enable for harder planning-heavy tasks.
MODEL_THINKING="${MODEL_THINKING:-false}"

# Speculative decoding draft — Qwen3-0.6B shares the Qwen3 tokenizer and
# drafts for every tier (8B dense through 32B dense and the 30B MoE).
# ~0.6 GB VRAM at Q8_0. Toggled by the spec_decode setting (--setup).
MODEL_DRAFT_FILE="${MODEL_DRAFT_FILE:-Qwen3-0.6B-Q8_0.gguf}"
MODEL_DRAFT_URL="${MODEL_DRAFT_URL:-https://huggingface.co/unsloth/Qwen3-0.6B-GGUF/resolve/main/Qwen3-0.6B-Q8_0.gguf}"
MODEL_DRAFT_SHA256="${MODEL_DRAFT_SHA256:-e150ed544dfe6016930c026a93913a5e3184181ebfe6ab2223ae01dd0491784c}"
MODEL_DRAFT_VRAM_GB="${MODEL_DRAFT_VRAM_GB:-1}"

# --- [ TIER MODEL DEFINITIONS ] -----------------------------------------------
# Each tier has these variables:
#   MODEL_<tier>_FILE  — filename stored under MODEL_STORAGE_DIR
#   MODEL_<tier>_URL   — direct GGUF download URL
#   MODEL_<tier>_DESC  — human-readable description shown during download
#   MODEL_<tier>_SHA256 — expected sha256, verified after download (blank = skip)
#   MODEL_N_DESC  — human-readable label shown in logs and menus
#   MODEL_N_SHA256 — expected sha256, verified after download (blank = skip)
#
# Models listed best-quality-first. The last entry (MODEL_N_WEIGHTS_GB=0) is the
# unconditional fallback. The 12/16GB duplicate entry is removed — a single
# Q2_K entry serves that range.
#
# Sizes:
#   Qwen3-32B Q6_K         = 26.9 GB
#   Qwen3-30B-A3B Q3_K_M   = 14.7 GB  (MoE, 3.3B active)
#   Qwen3-30B-A3B Q2_K     = 11.3 GB  (MoE, 3.3B active)
#   Qwen3-8B Q4_K_M        =  5.03 GB
MODEL_COUNT="${MODEL_COUNT:-4}"

# 1 — Qwen3-32B Q6_K: 26.9 GB; near-lossless dense 32B; fits 33GB+
MODEL_1_FILE="${MODEL_1_FILE:-Qwen3-32B-Q6_K.gguf}"
MODEL_1_URL="${MODEL_1_URL:-https://huggingface.co/unsloth/Qwen3-32B-GGUF/resolve/main/Qwen3-32B-Q6_K.gguf}"
MODEL_1_SHA256="${MODEL_1_SHA256:-47eb3b57d774b7c4f730d3ca1d63c987e03a4c19c925145b777fdd530da4c447}"
MODEL_1_DESC="${MODEL_1_DESC:-Qwen3 32B Q6_K (~26.9GB)}"
MODEL_1_WEIGHTS_GB="${MODEL_1_WEIGHTS_GB:-27}"

# 2 — Qwen3-30B-A3B Q3_K_M: 14.7 GB; MoE quality/speed sweet spot; fits 21GB+
MODEL_2_FILE="${MODEL_2_FILE:-Qwen3-30B-A3B-Q3_K_M.gguf}"
MODEL_2_URL="${MODEL_2_URL:-https://huggingface.co/unsloth/Qwen3-30B-A3B-GGUF/resolve/main/Qwen3-30B-A3B-Q3_K_M.gguf}"
MODEL_2_SHA256="${MODEL_2_SHA256:-a63f06070fccd2e3a329f3bfe5e996709a7f305d04c6acf2c8ae900c4723fffa}"
MODEL_2_DESC="${MODEL_2_DESC:-Qwen3 30B-A3B Q3_K_M MoE (~14.7GB)}"
MODEL_2_WEIGHTS_GB="${MODEL_2_WEIGHTS_GB:-15}"

# 3 — Qwen3-30B-A3B Q2_K: 11.3 GB; MoE near-8B inference speed; fits 17GB+
MODEL_3_FILE="${MODEL_3_FILE:-Qwen3-30B-A3B-Q2_K.gguf}"
MODEL_3_URL="${MODEL_3_URL:-https://huggingface.co/unsloth/Qwen3-30B-A3B-GGUF/resolve/main/Qwen3-30B-A3B-Q2_K.gguf}"
MODEL_3_SHA256="${MODEL_3_SHA256:-db3ce897ccc9e7d9dbf17fe083cae7880a2092aa473b45eba8b77715aa9ca170}"
MODEL_3_DESC="${MODEL_3_DESC:-Qwen3 30B-A3B Q2_K MoE (~11.3GB)}"
MODEL_3_WEIGHTS_GB="${MODEL_3_WEIGHTS_GB:-12}"

# 4 — Qwen3-8B Q4_K_M: 5.03 GB; unconditional fallback (WEIGHTS_GB=0)
MODEL_4_FILE="${MODEL_4_FILE:-Qwen3-8B-Q4_K_M.gguf}"
MODEL_4_URL="${MODEL_4_URL:-https://huggingface.co/unsloth/Qwen3-8B-GGUF/resolve/main/Qwen3-8B-Q4_K_M.gguf}"
MODEL_4_SHA256="${MODEL_4_SHA256:-120307ba529eb2439d6c430d94104dabd578497bc7bfe7e322b5d9933b449bd4}"
MODEL_4_DESC="${MODEL_4_DESC:-Qwen3 8B Q4_K_M (~5.03GB, fallback)}"
MODEL_4_WEIGHTS_GB="${MODEL_4_WEIGHTS_GB:-0}"
