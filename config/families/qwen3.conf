#!/bin/bash
# ==============================================================================
# QWEN3.CONF | Qwen3 Model Family Configuration
# ==============================================================================
# Defines the model family identity and per-VRAM-tier model files for Qwen3.
# Sourced by ai-coder after family selection, following config/ai-coder-model.conf.
#
# Qwen3 offers two model types used here:
#   Dense  — Qwen3-8B (8.2B params): standard full-parameter model.
#   MoE    — Qwen3-30B-A3B (30.5B total / 3.3B active): Mixture-of-Experts model
#            that activates only 3.3B parameters per token, giving near-8B
#            inference speed with significantly higher quality.
#   Dense  — Qwen3-32B (32.8B params): high-quality dense model for 24/32GB tiers.
#
# All models support built-in thinking mode (/think, /no_think in the prompt).
#
# Every setting can be overridden by exporting the variable before invoking
# ai-coder — the ${VAR:-default} pattern means the env var wins when set.

# Guard against double-sourcing
[ "${_AI_CODER_QWEN3_CONF_LOADED:-}" = "1" ] && return 0
readonly _AI_CODER_QWEN3_CONF_LOADED=1

# --- [ MODEL FAMILY ] ---------------------------------------------------------

# Display name shown in the family selection menu, status messages, and logs.
MODEL_FAMILY="${MODEL_FAMILY:-Qwen3}"

# KV cache quantization — q8_0 is fine; all Qwen3 tiers fit within their VRAM budget.
MODEL_KV_TYPE="${MODEL_KV_TYPE:-q8_0}"

# Jinja chat template — use the model's built-in Jinja template for prompt formatting.
# Qwen3's template produces standard JSON tool calls; --jinja is safe and recommended.
MODEL_JINJA="${MODEL_JINJA:-true}"

# Thinking mode — disabled by default for agent use: Qwen3 emits hundreds of
# reasoning tokens before every tool call, which makes agent loops sluggish.
# Set MODEL_THINKING=true to re-enable for harder planning-heavy tasks.
MODEL_THINKING="${MODEL_THINKING:-false}"

# --- [ TIER MODEL DEFINITIONS ] -----------------------------------------------
# Each tier has these variables:
#   MODEL_<tier>_FILE  — filename stored under MODEL_STORAGE_DIR
#   MODEL_<tier>_URL   — direct GGUF download URL
#   MODEL_<tier>_DESC  — human-readable description shown during download
#   MODEL_<tier>_SHA256 — expected sha256, verified after download (blank = skip)

# 8GB tier: Qwen3-8B Q4_K_M — 5.03 GB, dense model, fits with headroom
MODEL_8GB_FILE="${MODEL_8GB_FILE:-Qwen3-8B-Q4_K_M.gguf}"
MODEL_8GB_URL="${MODEL_8GB_URL:-https://huggingface.co/unsloth/Qwen3-8B-GGUF/resolve/main/Qwen3-8B-Q4_K_M.gguf}"
MODEL_8GB_SHA256="${MODEL_8GB_SHA256:-120307ba529eb2439d6c430d94104dabd578497bc7bfe7e322b5d9933b449bd4}"
MODEL_8GB_DESC="${MODEL_8GB_DESC:-Qwen3 8B Q4_K_M (8GB tier)}"

# 12GB tier: Qwen3-30B-A3B Q2_K — 11.3 GB, MoE (3.3B active), near-8B speed
MODEL_12GB_FILE="${MODEL_12GB_FILE:-Qwen3-30B-A3B-Q2_K.gguf}"
MODEL_12GB_URL="${MODEL_12GB_URL:-https://huggingface.co/unsloth/Qwen3-30B-A3B-GGUF/resolve/main/Qwen3-30B-A3B-Q2_K.gguf}"
MODEL_12GB_SHA256="${MODEL_12GB_SHA256:-db3ce897ccc9e7d9dbf17fe083cae7880a2092aa473b45eba8b77715aa9ca170}"
MODEL_12GB_DESC="${MODEL_12GB_DESC:-Qwen3 30B-A3B Q2_K MoE (12GB tier)}"

# 16GB tier: Qwen3-30B-A3B Q2_K — same 11.3 GB file; leaves ~4 GB headroom for KV cache
MODEL_16GB_FILE="${MODEL_16GB_FILE:-Qwen3-30B-A3B-Q2_K.gguf}"
MODEL_16GB_URL="${MODEL_16GB_URL:-https://huggingface.co/unsloth/Qwen3-30B-A3B-GGUF/resolve/main/Qwen3-30B-A3B-Q2_K.gguf}"
MODEL_16GB_SHA256="${MODEL_16GB_SHA256:-db3ce897ccc9e7d9dbf17fe083cae7880a2092aa473b45eba8b77715aa9ca170}"
MODEL_16GB_DESC="${MODEL_16GB_DESC:-Qwen3 30B-A3B Q2_K MoE (16GB tier)}"

# 24GB tier: Qwen3-30B-A3B Q3_K_M — 14.7 GB, MoE quality/speed sweet spot
MODEL_24GB_FILE="${MODEL_24GB_FILE:-Qwen3-30B-A3B-Q3_K_M.gguf}"
MODEL_24GB_URL="${MODEL_24GB_URL:-https://huggingface.co/unsloth/Qwen3-30B-A3B-GGUF/resolve/main/Qwen3-30B-A3B-Q3_K_M.gguf}"
MODEL_24GB_SHA256="${MODEL_24GB_SHA256:-a63f06070fccd2e3a329f3bfe5e996709a7f305d04c6acf2c8ae900c4723fffa}"
MODEL_24GB_DESC="${MODEL_24GB_DESC:-Qwen3 30B-A3B Q3_K_M MoE (24GB tier)}"

# 32GB tier: Qwen3-32B Q6_K — 26.9 GB, near-lossless dense 32B
MODEL_32GB_FILE="${MODEL_32GB_FILE:-Qwen3-32B-Q6_K.gguf}"
MODEL_32GB_URL="${MODEL_32GB_URL:-https://huggingface.co/unsloth/Qwen3-32B-GGUF/resolve/main/Qwen3-32B-Q6_K.gguf}"
MODEL_32GB_SHA256="${MODEL_32GB_SHA256:-47eb3b57d774b7c4f730d3ca1d63c987e03a4c19c925145b777fdd530da4c447}"
MODEL_32GB_DESC="${MODEL_32GB_DESC:-Qwen3 32B Q6_K (32GB tier)}"
