#!/bin/bash
# ==============================================================================
# AI-CODER-MODEL.CONF | Model Framework Configuration
# ==============================================================================
# This file defines the model infrastructure variables that are not tied to any
# specific model family (GPU mode, inference settings, VRAM tier thresholds).
#
# Family-specific defaults (model names, download URLs, display names) live in
# a separate family config file, e.g. config/gemma4.conf.
#
# Every setting can be overridden by exporting the variable before invoking
# ai-coder — the ${VAR:-default} pattern means the env var wins when set.

# Guard against double-sourcing
[ "${_AI_CODER_MODEL_CONF_LOADED:-}" = "1" ] && return 0
readonly _AI_CODER_MODEL_CONF_LOADED=1

# --- [ GPU CONFIGURATION ] ---------------------------------------------------

# GPU usage mode for inference:
#   "multi"  — use all available GPUs with automatic tensor-split (default).
#              Best for large models that benefit from combined VRAM.
#   "single" — restrict inference to GPU 0 only (simpler, lower overhead).
#              Useful if secondary GPUs are used for display or other workloads.
# Override by exporting GPU_MODE before running ai-coder, or run --setup
# to be prompted and have the choice saved for future runs.
GPU_MODE="${GPU_MODE:-multi}"

# --- [ INFERENCE SETTINGS ] ---------------------------------------------------

# Context window level. Controls tokens per parallel slot passed as -c to llama.cpp.
# Choose a named level; the mapping below converts it to the actual token count.
#
#   Level   Tokens    Typical use
#   ------  --------  -------------------------------------------
#   4k        4 096   Minimal — fast, very low VRAM overhead
#   8k        8 192   Small tasks, quick completions
#   16k      16 384   Standard chat / short coding sessions
#   32k      32 768   Medium projects, moderate context
#   64k      65 536   Large projects, long conversations (default)
#   128k    131 072   Extended context
#   256k    262 144   Maximum — requires substantial VRAM
#
# 64k is the default: local coding agents rarely benefit past it, and every
# doubling costs KV-cache VRAM (competing with model quant tier) plus slower
# prompt processing on every request.
MODEL_CTX_LEVEL="${MODEL_CTX_LEVEL:-64k}"

# Map the level to a token count. Override MODEL_CTX_SIZE directly to bypass.
case "${MODEL_CTX_LEVEL}" in
    4k)   _ctx=4096   ;;
    8k)   _ctx=8192   ;;
    16k)  _ctx=16384  ;;
    32k)  _ctx=32768  ;;
    64k)  _ctx=65536  ;;
    128k) _ctx=131072 ;;
    256k) _ctx=262144 ;;
    *)    _ctx=65536  ;;  # fallback to 64k for unknown values
esac
MODEL_CTX_SIZE="${MODEL_CTX_SIZE:-$_ctx}"
unset _ctx

# KV cache quantization type. Passed as -ctk (and -ctv unless MODEL_KV_TYPE_V
# is set) to llama.cpp. q8_0 gives best quality; q4_0 halves VRAM usage for
# large models.
# Intentionally NOT assigned here: family confs (sourced after this file) own
# the default via ${MODEL_KV_TYPE:-...}, and assigning a value first would
# make those defaults inert. An exported env var still wins over the family
# conf; code falls back to q8_0 when neither sets it.

# V-cache quantization type. Passed as -ctv to llama.cpp. Leave unset to
# follow the kv_asym setup preference (ai-coder --setup, default off): when
# asymmetric KV cache is enabled the V cache drops to q4_0 while keys keep
# MODEL_KV_TYPE — keys are more quantization-sensitive than values, so this
# trims ~25% off the KV reserve at a small long-context quality cost.
# Set explicitly here or in a family conf to pin it regardless of the setting.
MODEL_KV_TYPE_V="${MODEL_KV_TYPE_V:-}"

# Estimated KV-cache bytes per token, used to reserve VRAM before picking the
# model tier so model + KV cache actually fit together. Leave unset to derive
# from the K/V types (96 KiB/token at q8_0 — a middle estimate for 8B-35B GQA
# models; halved for q4_0, doubled for f16, split evenly between K and V).
# Set explicitly in a family conf if a model's layers x KV-heads geometry is
# far from that band.
MODEL_KV_BYTES_PER_TOKEN="${MODEL_KV_BYTES_PER_TOKEN:-}"

# Per-GPU VRAM overhead reserve in GB, subtracted (× GPUs in use) before
# picking the model tier. Covers what the KV estimate does not: CUDA context
# (~0.5GB), llama.cpp compute buffers (~0.5-1GB with large batches), and
# desktop/display usage on the GPU driving the monitors. Without it the
# picker chooses models that fit only on paper — the driver then silently
# pages VRAM to system RAM and generation slows by an order of magnitude.
MODEL_VRAM_OVERHEAD_GB="${MODEL_VRAM_OVERHEAD_GB:-2}"

# Number of parallel inference slots. Passed as --parallel to llama.cpp.
MODEL_MAX_SLOTS="${MODEL_MAX_SLOTS:-1}"

# KV prompt-cache reuse chunk size. Passed as --cache-reuse to llama.cpp.
# Agent conversations grow by appending, so reusing cached prefix chunks
# avoids reprocessing the whole prompt every turn (big TTFT win).
# Set to 0 to disable cache reuse.
MODEL_CACHE_REUSE="${MODEL_CACHE_REUSE:-256}"

# Thinking / reasoning mode. "true" (default) leaves the model's built-in
# behaviour untouched; "false" passes --reasoning-budget 0 to llama.cpp,
# which disables thinking on reasoning models (Qwen3 family). Thinking burns
# hundreds of tokens before every tool call — disabling it makes agent turns
# much snappier at some cost in planning quality on hard tasks.
# Harmless on non-reasoning models.
# Intentionally NOT assigned here (see MODEL_KV_TYPE above): family confs own
# the default; env var wins; code falls back to true when neither sets it.

# Repeat penalty — OFF by default (empty). Penalizing repeated tokens hurts
# coding models: indentation, repeated identifiers, and JSON keys in tool
# calls are legitimately repetitive, and a penalty is a known cause of
# malformed tool-call JSON. Set a value (e.g. 1.1) in a family conf or the
# environment only if a specific model needs it.
MODEL_REPEAT_PENALTY="${MODEL_REPEAT_PENALTY:-}"
MODEL_REPEAT_LAST_N="${MODEL_REPEAT_LAST_N:-128}"

# (MODEL_TIER_*_MIN thresholds removed — model selection now uses per-candidate
# MODEL_N_WEIGHTS_GB values defined in each family conf.)

# --- [ MODEL FAMILY ] ---------------------------------------------------------
# MODEL_FAMILY and all MODEL_N_FILE / URL / DESC / WEIGHTS_GB / SHA256 variables
# are defined in a family-specific config file under config/families/.
# The active family is selected at runtime and sourced by ai-coder after this file.
#
# Each family conf defines an ordered candidate list (best quality first):
#   MODEL_COUNT              — total number of candidates
#   MODEL_N_FILE             — GGUF filename under MODEL_STORAGE_DIR
#   MODEL_N_URL              — direct download URL
#   MODEL_N_DESC             — human-readable label shown in logs and menus
#   MODEL_N_SHA256           — expected sha256 (blank = skip verification)
#   MODEL_N_WEIGHTS_GB       — ceiling of model file size in GB; 0 = unconditional fallback
#
# select_model_for_vram() walks 1..MODEL_COUNT and picks the first entry whose
# WEIGHTS_GB fits within EFFECTIVE_VRAM_GB (total VRAM minus KV-cache reserve).
# The last entry must have WEIGHTS_GB=0 so it is always selected as fallback.
#
# --- [ SPECULATIVE DECODING (per family) ] -------------------------------------
# A family conf may define a draft model for speculative decoding — a tiny
# model (sharing the main model's tokenizer) that proposes tokens the main
# model verifies in one pass, typically 1.5-2x generation speed on code:
#   MODEL_DRAFT_FILE     — draft GGUF filename under MODEL_STORAGE_DIR
#   MODEL_DRAFT_URL      — direct download URL
#   MODEL_DRAFT_SHA256   — expected sha256 (blank = skip verification)
#   MODEL_DRAFT_VRAM_GB  — VRAM reserved for the draft in tier selection (default 1)
# Users toggle the feature with the spec_decode setting (ai-coder --setup,
# default on); it only activates for families that define a draft.
