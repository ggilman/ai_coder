#!/bin/bash
# ==============================================================================
# AI-CODER-MODEL.CONF | Model Framework Configuration
# ==============================================================================
# This file defines the model infrastructure variables that are not tied to any
# specific model family (GPU mode, inference settings, VRAM tier thresholds).
#
# Family-specific defaults (model names, download URLs, display names) live in
# a separate family config file, e.g. config/gemma4.conf.
#
# Every setting can be overridden by exporting the variable before invoking
# ai-coder — the ${VAR:-default} pattern means the env var wins when set.

# Guard against double-sourcing
[ "${_AI_CODER_MODEL_CONF_LOADED:-}" = "1" ] && return 0
readonly _AI_CODER_MODEL_CONF_LOADED=1

# --- [ GPU CONFIGURATION ] ---------------------------------------------------

# GPU usage mode for inference:
#   "multi"  — use all available GPUs with automatic tensor-split (default).
#              Best for large models that benefit from combined VRAM.
#   "single" — restrict inference to GPU 0 only (simpler, lower overhead).
#              Useful if secondary GPUs are used for display or other workloads.
# Override by exporting GPU_MODE before running ai-coder, or run --setup
# to be prompted and have the choice saved for future runs.
GPU_MODE="${GPU_MODE:-multi}"

# --- [ INFERENCE SETTINGS ] ---------------------------------------------------

# Context window size per parallel slot (tokens). Passed as -c to llama.cpp.
MODEL_CTX_SIZE="${MODEL_CTX_SIZE:-65536}"

# Number of parallel inference slots. Passed as --parallel to llama.cpp.
MODEL_MAX_SLOTS="${MODEL_MAX_SLOTS:-1}"

# When true, abort if no file matching MODEL_FILE_PATTERN is found locally.
# Set to false to allow any GGUF found in MODEL_STORAGE_DIR as a fallback.
MODEL_STRICT_FAMILY="${MODEL_STRICT_FAMILY:-true}"

# --- [ VRAM TIER CUTOFFS (GB) ] -----------------------------------------------
# Minimum total VRAM required to qualify for each tier. Tiers are evaluated
# from largest to smallest; the first matching tier wins.

MODEL_TIER_8GB_MIN="${MODEL_TIER_8GB_MIN:-8}"
MODEL_TIER_12GB_MIN="${MODEL_TIER_12GB_MIN:-11}"
MODEL_TIER_16GB_MIN="${MODEL_TIER_16GB_MIN:-15}"
MODEL_TIER_24GB_MIN="${MODEL_TIER_24GB_MIN:-23}"
MODEL_TIER_32GB_MIN="${MODEL_TIER_32GB_MIN:-31}"

# --- [ MODEL FAMILY ] ---------------------------------------------------------
# MODEL_FAMILY, MODEL_FILE_PATTERN, and all MODEL_<tier>_FILE / URL / DESC
# variables are defined in a family-specific config file under config/families/.
# The active family is selected at runtime and sourced by ai-coder after this file.
